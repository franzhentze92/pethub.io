<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E0E7FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3E8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86EFAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <!-- Shadows -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="url(#skyGradient)"/>
  
  <!-- Subtle clouds -->
  <ellipse cx="200" cy="100" rx="80" ry="40" fill="white" opacity="0.4"/>
  <ellipse cx="230" cy="100" rx="70" ry="35" fill="white" opacity="0.4"/>
  <ellipse cx="700" cy="120" rx="90" ry="45" fill="white" opacity="0.4"/>
  <ellipse cx="730" cy="120" rx="75" ry="38" fill="white" opacity="0.4"/>
  
  <!-- Ground/Grass -->
  <rect y="500" width="900" height="200" fill="url(#grassGradient)"/>
  
  <!-- Modern geometric shapes (background decoration) -->
  <circle cx="100" cy="200" r="60" fill="url(#purpleGradient)" opacity="0.1"/>
  <circle cx="800" cy="300" r="80" fill="url(#pinkGradient)" opacity="0.1"/>
  
  <!-- Professional Person -->
  <g transform="translate(350, 320)" filter="url(#softShadow)">
    <!-- Head -->
    <circle cx="0" cy="0" r="32" fill="#FCD34D"/>
    <!-- Hair -->
    <path d="M -25 -20 Q -30 -35 -25 -40 Q -20 -45 -15 -40 Q -10 -35 -5 -30 Q 0 -25 5 -30 Q 10 -35 15 -40 Q 20 -45 25 -40 Q 30 -35 25 -20" fill="#92400E"/>
    <!-- Face details -->
    <circle cx="-10" cy="-8" r="4" fill="#1F2937"/>
    <circle cx="10" cy="-8" r="4" fill="#1F2937"/>
    <path d="M -8 8 Q 0 12 8 8" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Professional shirt -->
    <rect x="-28" y="32" width="56" height="65" rx="6" fill="url(#purpleGradient)"/>
    <rect x="-28" y="32" width="56" height="12" rx="6" fill="#7C3AED"/>
    <!-- Collar -->
    <path d="M -20 32 L -10 44 L 10 44 L 20 32" fill="#F3F4F6"/>
    <!-- Arms -->
    <ellipse cx="-35" cy="50" rx="10" ry="30" fill="#FCD34D" transform="rotate(-25 -35 50)"/>
    <ellipse cx="35" cy="50" rx="10" ry="30" fill="#FCD34D" transform="rotate(25 35 50)"/>
    <!-- Smartphone (modern design) -->
    <rect x="-42" y="25" width="16" height="28" rx="2" fill="#1F2937" filter="url(#softShadow)"/>
    <rect x="-40" y="27" width="12" height="22" rx="1" fill="#60A5FA"/>
    <circle cx="-34" y="52" r="2" fill="#1F2937"/>
    <!-- Right hand petting -->
    <ellipse cx="38" cy="60" rx="7" ry="10" fill="#FCD34D" transform="rotate(35 38 60)"/>
  </g>
  
  <!-- Golden Retriever (professional style) -->
  <g transform="translate(480, 400)" filter="url(#softShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="55" ry="40" fill="#FCD34D"/>
    <!-- Chest -->
    <ellipse cx="0" cy="5" rx="35" ry="25" fill="#FEF3C7"/>
    <!-- Head -->
    <ellipse cx="0" cy="-50" rx="40" ry="35" fill="#FCD34D"/>
    <!-- Ears -->
    <ellipse cx="-28" cy="-55" rx="15" ry="25" fill="#DC2626" transform="rotate(-35)"/>
    <ellipse cx="28" cy="-55" rx="15" ry="25" fill="#DC2626" transform="rotate(35)"/>
    <!-- Snout -->
    <ellipse cx="0" cy="-35" rx="18" ry="15" fill="#FCD34D"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-30" rx="5" ry="4" fill="#1F2937"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-48" r="5" fill="#1F2937"/>
    <circle cx="12" cy="-48" r="5" fill="#1F2937"/>
    <circle cx="-10" cy="-46" r="2" fill="white"/>
    <circle cx="14" cy="-46" r="2" fill="white"/>
    <!-- Mouth -->
    <path d="M 0 -30 Q -8 -20 -12 -15" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 -30 Q 8 -20 12 -15" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Professional collar -->
    <ellipse cx="0" cy="-42" rx="25" ry="10" fill="url(#pinkGradient)"/>
    <rect x="-2" y="-47" width="4" height="10" fill="#F3F4F6"/>
    <!-- Tail -->
    <ellipse cx="50" cy="-15" rx="18" ry="10" fill="#FCD34D" transform="rotate(50 50 -15)"/>
  </g>
  
  <!-- Corgi (professional style) -->
  <g transform="translate(520, 480)" filter="url(#softShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="35" ry="25" fill="#1F2937"/>
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#FCD34D"/>
    <!-- Head -->
    <ellipse cx="0" cy="-30" rx="25" ry="20" fill="#FCD34D"/>
    <!-- Ears -->
    <ellipse cx="-18" cy="-35" rx="10" ry="15" fill="#1F2937" transform="rotate(-25)"/>
    <ellipse cx="18" cy="-35" rx="10" ry="15" fill="#1F2937" transform="rotate(25)"/>
    <!-- Snout -->
    <ellipse cx="0" cy="-25" rx="12" ry="10" fill="#FCD34D"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-22" rx="4" ry="3" fill="#1F2937"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-30" r="4" fill="#1F2937"/>
    <circle cx="8" cy="-30" r="4" fill="#1F2937"/>
    <!-- Collar -->
    <ellipse cx="0" cy="-28" rx="15" ry="6" fill="url(#pinkGradient)"/>
    <!-- Legs -->
    <rect x="-22" y="20" width="10" height="15" fill="#1F2937" rx="2"/>
    <rect x="-5" y="20" width="10" height="15" fill="#1F2937" rx="2"/>
    <rect x="5" y="20" width="10" height="15" fill="#1F2937" rx="2"/>
    <rect x="22" y="20" width="10" height="15" fill="#1F2937" rx="2"/>
  </g>
  
  <!-- Orange Cat (professional style) -->
  <g transform="translate(280, 450)" filter="url(#softShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="30" ry="25" fill="#FB923C"/>
    <!-- Head -->
    <ellipse cx="0" cy="-25" rx="22" ry="18" fill="#FB923C"/>
    <!-- Ears -->
    <path d="M -18 -38 L -10 -25 L -14 -30 Z" fill="#FB923C"/>
    <path d="M 18 -38 L 10 -25 L 14 -30 Z" fill="#FB923C"/>
    <path d="M -18 -38 L -10 -25 L -12 -27 Z" fill="#FED7AA"/>
    <path d="M 18 -38 L 10 -25 L 12 -27 Z" fill="#FED7AA"/>
    <!-- Eyes -->
    <ellipse cx="-7" cy="-28" rx="4" ry="5" fill="#1F2937"/>
    <ellipse cx="7" cy="-28" rx="4" ry="5" fill="#1F2937"/>
    <circle cx="-6" cy="-27" r="1.5" fill="white"/>
    <circle cx="8" cy="-27" r="1.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-23" rx="2.5" ry="2" fill="#F472B6"/>
    <!-- Mouth -->
    <path d="M 0 -23 L -5 -18 M 0 -23 L 5 -18" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
    <!-- Collar -->
    <ellipse cx="0" cy="-20" rx="12" ry="5" fill="url(#pinkGradient)"/>
    <!-- Tail -->
    <ellipse cx="25" cy="-8" rx="15" ry="6" fill="#FB923C" transform="rotate(35 25 -8)"/>
  </g>
  
  <!-- Modern Pet Supplies -->
  <g transform="translate(200, 480)" filter="url(#softShadow)">
    <!-- Modern storage box -->
    <rect x="0" y="0" width="90" height="70" rx="4" fill="#92400E"/>
    <rect x="0" y="0" width="90" height="12" rx="4" fill="#78350F"/>
    <rect x="0" y="58" width="90" height="12" rx="4" fill="#78350F"/>
    <line x1="45" y1="0" x2="45" y2="70" stroke="#78350F" stroke-width="2"/>
    <!-- Items -->
    <rect x="15" y="15" width="12" height="25" rx="2" fill="url(#purpleGradient)"/>
    <rect x="35" y="15" width="12" height="25" rx="2" fill="url(#purpleGradient)"/>
    <ellipse cx="55" cy="30" rx="8" ry="5" fill="#FCD34D"/>
  </g>
  
  <!-- Modern Pet Bowls -->
  <g transform="translate(600, 480)" filter="url(#softShadow)">
    <!-- Bowl 1 -->
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="url(#purpleGradient)"/>
    <ellipse cx="0" cy="-3" rx="24" ry="7" fill="#F3E8FF"/>
    <circle cx="-5" cy="-3" r="3" fill="#FCD34D"/>
    <circle cx="5" cy="-3" r="3" fill="#FCD34D"/>
    <!-- Bowl 2 -->
    <ellipse cx="70" cy="0" rx="30" ry="10" fill="url(#purpleGradient)"/>
    <ellipse cx="70" cy="-3" rx="24" ry="7" fill="#F3E8FF"/>
    <circle cx="65" cy="-3" r="2" fill="#A855F7"/>
    <circle cx="75" cy="-3" r="2" fill="#A855F7"/>
  </g>
  
  <!-- Modern Tablet with Vet Scene -->
  <g transform="translate(650, 180)" filter="url(#shadow)">
    <!-- Tablet frame -->
    <rect x="0" y="0" width="140" height="105" rx="10" fill="#1F2937"/>
    <rect x="5" y="5" width="130" height="95" rx="6" fill="#F8FAFC"/>
    <!-- Screen content -->
    <rect x="15" y="15" width="30" height="40" fill="#F3F4F6" rx="2"/>
    <circle cx="30" cy="8" r="6" fill="#FCD34D"/>
    <!-- Vet figure -->
    <rect x="20" y="20" width="20" height="30" fill="#F3F4F6" rx="2"/>
    <!-- Pet being examined -->
    <ellipse cx="80" cy="50" rx="18" ry="12" fill="#92400E"/>
    <ellipse cx="80" cy="40" rx="12" ry="10" fill="#92400E"/>
    <!-- Medical icon -->
    <circle cx="100" cy="25" r="8" fill="#10B981"/>
    <path d="M 100 20 L 100 30 M 95 25 L 105 25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Modern Heart Icon with Paw -->
  <g transform="translate(700, 240)" filter="url(#softShadow)">
    <!-- Heart -->
    <path d="M 0 0 C -25 -25 -50 -15 -50 15 C -50 40 0 65 0 65 C 0 65 50 40 50 15 C 50 -15 25 -25 0 0" fill="url(#pinkGradient)"/>
    <!-- Paw print inside -->
    <circle cx="0" cy="15" r="10" fill="white"/>
    <circle cx="-15" cy="28" r="6" fill="white"/>
    <circle cx="15" cy="28" r="6" fill="white"/>
    <circle cx="-10" cy="35" r="6" fill="white"/>
    <circle cx="10" cy="35" r="6" fill="white"/>
  </g>
  
  <!-- Subtle decorative elements -->
  <g opacity="0.3">
    <circle cx="150" cy="250" r="4" fill="url(#purpleGradient)"/>
    <circle cx="750" cy="200" r="4" fill="url(#pinkGradient)"/>
    <circle cx="200" cy="150" r="4" fill="url(#blueGradient)"/>
  </g>
  
  <!-- Modern geometric accent -->
  <polygon points="100,350 120,330 140,350 120,370" fill="url(#purpleGradient)" opacity="0.2"/>
  <polygon points="800,400 820,380 840,400 820,420" fill="url(#pinkGradient)" opacity="0.2"/>
</svg>
